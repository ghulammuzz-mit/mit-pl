name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: ""
          - goos: linux
            goarch: arm64
            suffix: ""
          - goos: darwin
            goarch: amd64
            suffix: ""
          - goos: darwin
            goarch: arm64
            suffix: ""
          - goos: windows
            goarch: amd64
            suffix: ".exe"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build envctl
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
          INFISICAL_BUILD_CLIENT_ID: ${{ secrets.INFISICAL_BUILD_CLIENT_ID }}
          INFISICAL_BUILD_CLIENT_SECRET: ${{ secrets.INFISICAL_BUILD_CLIENT_SECRET }}
          INFISICAL_BUILD_SITE_URL: ${{ secrets.INFISICAL_BUILD_SITE_URL }}
        run: |
          VERSION=${GITHUB_REF_NAME}
          COMMIT=$(git rev-parse --short HEAD)
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          PKG="mit/platform/internal/envctl/infisical"
          LDFLAGS="-s -w \
            -X 'main.version=${VERSION}' \
            -X 'main.commit=${COMMIT}' \
            -X 'main.buildDate=${DATE}' \
            -X '${PKG}.embeddedClientID=${INFISICAL_BUILD_CLIENT_ID}' \
            -X '${PKG}.embeddedClientSecret=${INFISICAL_BUILD_CLIENT_SECRET}' \
            -X '${PKG}.embeddedSiteURL=${INFISICAL_BUILD_SITE_URL}'"
          OUTPUT="envctl-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }}"
          go build -trimpath -ldflags="${LDFLAGS}" -o "dist/${OUTPUT}" ./cmd/envctl

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: envctl-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**
          generate_release_notes: true
